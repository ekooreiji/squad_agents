# Security Configuration Templates

## 1. Nginx Security Headers

```nginx
# /etc/nginx/conf.d/security.conf

# Security headers
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=()" always;

# HSTS
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Remove server header
more_clear_headers Server;

# TLS Configuration
ssl_protocols TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;
```

## 2. CSP Policy

```yaml
# Content Security Policy
csp:
  default_src:
    - "'self'"
  script_src:
    - "'self'"
    - "'nonce-{NONCE}'"
    - "https://cdn.example.com"
  style_src:
    - "'self'"
    - "'unsafe-inline'"
  img_src:
    - "'self'"
    - "data:"
    - "https://images.example.com"
  font_src:
    - "'self'"
    - "https://fonts.example.com"
  connect_src:
    - "'self'"
    - "https://api.example.com"
  frame_src:
    - "'none'"
  frame_ancestors:
    - "'none'"
  form_action:
    - "'self'"
  base_uri:
    - "'self'"
  upgrade_insecure_requests: true
```

## 3. Rate Limiting

```yaml
# Rate Limiting Configuration
rateLimit:
  general:
    windowMs: 60000
    maxRequests: 100

  authentication:
    windowMs: 60000
    maxRequests: 10

  api:
    windowMs: 60000
    maxRequests: 100

  search:
    windowMs: 60000
    maxRequests: 30

  write:
    windowMs: 60000
    maxRequests: 50

  byIp: true
  byUser: true
  byKey: true

  headers:
    X-RateLimit-Limit: true
    X-RateLimit-Remaining: true
    X-RateLimit-Reset: true

  handler: |
    (req, res) => {
      res.status(429).json({
        error: 'Too many requests',
        retryAfter: res.getHeader('X-RateLimit-Reset')
      })
    }
```

## 4. CORS Configuration

```yaml
cors:
  origins:
    - "https://example.com"
    - "https://app.example.com"
  methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
  allowedHeaders:
    - "Content-Type"
    - "Authorization"
    - "X-CSRF-Token"
  exposedHeaders:
    - "X-Total-Count"
  credentials: true
  maxAge: 86400
```

## 5. Environment Example (.env.example)

```bash
# Application
NODE_ENV=production
APP_NAME=my-app
APP_VERSION=1.0.0

# Server
PORT=3000
HOST=0.0.0.0

# Database
DATABASE_URL=postgresql://user:password@localhost:5432/db
DATABASE_POOL_MIN=2
DATABASE_POOL_MAX=10

# Redis
REDIS_URL=redis://localhost:6379
REDIS_TLS=true

# Authentication
JWT_PUBLIC_KEY_FILE=/run/secrets/jwt_public.pem
JWT_PRIVATE_KEY_FILE=/run/secrets/jwt_private.pem
JWT_ACCESS_EXPIRY=1h
JWT_REFRESH_EXPIRY=30d

# Security
BCRYPT_ROUNDS=12
ALLOWED_ORIGINS=https://example.com,https://app.example.com
CSRF_SECRET_FILE=/run/secrets/csrf_secret

# Rate Limiting
RATE_LIMIT_GENERAL=100
RATE_LIMIT_AUTH=10
RATE_LIMIT_WINDOW=60000

# Monitoring
LOG_LEVEL=info
LOG_FORMAT=json
```

## 6. Helmet.js Configuration

```javascript
// security/middleware.js
import helmet from 'helmet'

export function securityMiddleware() {
  return [
    helmet.contentSecurityPolicy({
      directives: {
        defaultSrc: ["'self'"],
        scriptSrc: ["'self'", "'nonce-{NONCE}'"],
        styleSrc: ["'self'", "'unsafe-inline'"],
        imgSrc: ["'self'", 'data:', 'https:'],
        connectSrc: ["'self'", 'https://api.example.com'],
        fontSrc: ["'self'"],
        objectSrc: ["'none'"],
        mediaSrc: ["'self'"],
        frameSrc: ["'none'"]
      }
    }),
    helmet.hsts({
      maxAge: 63072000,
      includeSubDomains: true,
      preload: true
    }),
    helmet.frameguard({ action: 'deny' }),
    helmet.xssFilter(),
    helmet.noSniff(),
    helmet.referrerPolicy({ policy: 'strict-origin-when-cross-origin' }),
    helmet.permittedCrossDomainPolicies({ permittedPolicies: 'none' })
  ]
}
```